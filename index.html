<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Candela Lagreca — Showreel</title>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --green:   #00B37D;
      --dark:    #003D2B;
      --amber:   #F5C400;
      --border:  #00D68F;
      --muted:   #6B7280;
    }

    html, body {
      min-height: 100vh;
      background: #fff;
      color: var(--dark);
      font-family: 'Inter', sans-serif;
    }

    /* top gradient bar */
    .top-bar {
      height: 5px;
      background: linear-gradient(90deg, var(--green), var(--amber));
    }

    /* page */
    .page {
      min-height: calc(100vh - 5px);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 52px 24px 60px;
      gap: 28px;
    }

    /* name block */
    .header { text-align: center; }

    .header h1 {
      font-family: 'Plus Jakarta Sans', sans-serif;
      font-size: clamp(2.2rem, 5vw, 3.6rem);
      font-weight: 800;
      color: var(--dark);
      line-height: 1.0;
      margin-bottom: 10px;
    }

    .header h1 span { color: var(--green); }

    .header .role {
      font-size: 10px;
      letter-spacing: 3px;
      text-transform: uppercase;
      color: var(--muted);
      font-weight: 600;
    }

    /* divider */
    .divider {
      width: 48px;
      height: 3px;
      background: linear-gradient(90deg, var(--green), var(--amber));
      border-radius: 2px;
    }

    /* video */
    .video-wrap {
      width: 100%;
      max-width: 860px;
      position: relative;
      border-radius: 10px;
      overflow: hidden;
      box-shadow: 0 24px 64px rgba(0,61,43,.12), 0 0 0 1.5px var(--border);
    }

    .video-wrap::before {
      content: '';
      display: block;
      padding-top: 56.25%;
    }

    .video-wrap iframe {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      border: none;
    }

    /* cta */
    .cta {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
      justify-content: center;
    }

    .cta a {
      font-family: 'Plus Jakarta Sans', sans-serif;
      font-size: 10px;
      font-weight: 800;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      text-decoration: none;
      padding: 12px 26px;
      border-radius: 6px;
      transition: opacity .2s;
    }

    .cta a:hover { opacity: .8; }

    .btn-primary { background: var(--green); color: #fff; }
    .btn-secondary { background: transparent; color: var(--dark); border: 1.5px solid var(--border); }

    /* selected work section */
    .work-section {
      width: 100%;
      max-width: 1100px;
    }

    .work-section .section-label {
      font-size: 9px;
      letter-spacing: 3px;
      text-transform: uppercase;
      color: var(--muted);
      font-weight: 600;
      text-align: center;
      margin-bottom: 20px;
    }

    .video-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 14px;
    }

    .video-item {
      position: relative;
      border-radius: 8px;
      overflow: hidden;
      background: #000;
      box-shadow: 0 8px 24px rgba(0,61,43,.10), 0 0 0 1px rgba(0,214,143,.25);
    }

    .video-item::before {
      content: '';
      display: block;
      padding-top: 177.78%;
    }

    .video-item video {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    @media (max-width: 800px) {
      .video-grid { grid-template-columns: repeat(2, 1fr); }
    }

    @media (max-width: 600px) {
      .page { padding: 40px 16px 48px; }
      .video-grid { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>

  <div class="top-bar"></div>

  <div class="page">

    <div class="header">
      <h1>Candela <span>Lagreca</span></h1>
      <div class="role">Multimedia Producer & Digital Marketing</div>
    </div>

    <div class="divider"></div>

    <div class="video-wrap">
      <iframe
        src="https://www.youtube.com/embed/LcyRqwsqXv8?rel=0&color=white&modestbranding=1"
        title="Candela Lagreca — Showreel 2024"
        allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture"
        allowfullscreen>
      </iframe>
    </div>

    <div class="divider"></div>

    <div class="work-section">
      <div class="section-label">Selected Work</div>
      <div class="video-grid">

        <div class="video-item">
          <video controls preload="metadata">
            <source src="video-01.mp4" type="video/mp4"/>
          </video>
        </div>

        <div class="video-item">
          <video controls preload="metadata">
            <source src="video-02.mp4" type="video/mp4"/>
          </video>
        </div>

        <div class="video-item">
          <video controls preload="metadata">
            <source src="video-03.mp4" type="video/mp4"/>
          </video>
        </div>

        <div class="video-item">
          <video controls preload="metadata">
            <source src="video-04.mp4" type="video/mp4"/>
          </video>
        </div>

        <div class="video-item">
          <video controls preload="metadata">
            <source src="video-05.mp4" type="video/mp4"/>
          </video>
        </div>

        <div class="video-item">
          <video controls preload="metadata">
            <source src="video-06.mp4" type="video/mp4"/>
          </video>
        </div>

        <div class="video-item">
          <video controls preload="metadata">
            <source src="video-07.mp4" type="video/mp4"/>
          </video>
        </div>

        <div class="video-item">
          <video controls preload="metadata">
            <source src="video-08.mp4" type="video/mp4"/>
          </video>
        </div>

      </div>
    </div>

  </div>

  <script>
    document.querySelectorAll('.video-grid video').forEach(v => {
      v.addEventListener('loadedmetadata', () => { v.currentTime = 0.5; });
    });
  </script>

</body>
</html>
